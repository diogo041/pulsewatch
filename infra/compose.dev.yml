services:
  db:
    image: postgres:18
    container_name: pulsewatch-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pulsewatch
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pulsewatch_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulsewatch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pulsewatch_postgres_data:

